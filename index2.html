<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бурмалда Кликер”</title>
    <style>
        /* Тут начинается магия красоты (CSS) */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a; /* Тёмный фон */
            color: #f0f0f0; /* Светлый текст */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            user-select: none; /* Чтобы нельзя было выделить текст */
        }
        .container {
            background-color: #2b2b2b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            max-width: 400px;
        }
        h1 {
            color: #ffaa00; /* Золотой цвет */
            font-size: 3em;
            margin: 0 0 10px 0;
            text-shadow: 3px 3px 0px #cc7700;
        }
        .counter-box {
            background-color: #111;
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
        }
        #score {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffcc00;
            display: block;
        }
        .big-btn {
            background-color: #ff5500;
            border: none;
            color: white;
            padding: 25px 50px;
            font-size: 2em;
            font-weight: bold;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 8px 0px #993300;
            transition: all 0.1s ease;
            margin: 20px 0;
            outline: none;
        }
        .big-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0px #993300;
        }
        .shop {
            background-color: #333;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        .shop h3 {
            margin: 0 0 10px 0;
            color: #ffaa00;
        }
        .upgrade-btn {
            background-color: #444;
            border: 1px solid #ffaa00;
            color: #ffaa00;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        .upgrade-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍎 Бурмалда 🍎</h1>
        <p>Жми на Бурмалду, чтобы заработать очки!</p>
        
        <div class="counter-box">
            <span>🍏 Бурбаллы:</span>
            <span id="score">0</span>
        </div>

        <!-- Главная кнопка-кликер -->
        <button class="big-btn" id="clickBtn">🥊 БУРМАЛДА!</button>

        <p>Сила клика: <span id="clickPower">1</span></p>

        <div class="shop">
            <h3>🏪 Магазин</h3>
            <p>Купить "Золотую Бурмалду" (+1 к силе клика)</p>
            <button class="upgrade-btn" id="upgradeBtn">Купить за <span id="upgradeCost">10</span> бурбаллов</button>
        </div>
    </div>

    <script>
        // === Тут начинается МОЗГ игры (JavaScript) ===

        // Наши переменные (как банк и счётчик в кармане)
        let score = 0;
        let clickPower = 1;
        let upgradeCost = 10;

        // Находим наши HTML-элементы, чтобы потом их двигать
        const scoreSpan = document.getElementById("score");
        const clickPowerSpan = document.getElementById("clickPower");
        const clickBtn = document.getElementById("clickBtn");
        const upgradeBtn = document.getElementById("upgradeBtn");
        const upgradeCostSpan = document.getElementById("upgradeCost");
[30.04.2026 15:20] Тимоха: // Функция обновления всего текста на экране
        function updateUI() {
            scoreSpan.textContent = score;
            clickPowerSpan.textContent = clickPower;
            upgradeCostSpan.textContent = upgradeCost;

            // Если денег не хватает - кнопка тускнеет и не жмется
            if (score >= upgradeCost) {
                upgradeBtn.disabled = false;
                upgradeBtn.style.opacity = "1";
            } else {
                upgradeBtn.disabled = true;
                upgradeBtn.style.opacity = "0.5";
            }
        }

        // 1. Событие: КЛИК ПО ГЛАВНОЙ КНОПКЕ
        clickBtn.addEventListener('click', function() {
            score = score + clickPower;
            updateUI();
        });

        // 2. Событие: ПОКУПКА АПГРЕЙДА
        upgradeBtn.addEventListener('click', function() {
            // Проверяем, можем ли купить
            if (score >= upgradeCost) {
                score = score - upgradeCost; // Тратим бурбаллы
                clickPower = clickPower + 1;  // Увеличиваем силу клика
                // Делаем новую цену дороже (типа инфляция)
                upgradeCost = Math.floor(upgradeCost * 1.5);
                updateUI();
            }
        });

        // Старт игры
        updateUI();

    </script>
</body>
</html>
